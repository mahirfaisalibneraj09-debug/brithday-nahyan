<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        body {
            background-color: #000; /* Deep black for that terminal look */
            color: #fff;
            display: flex;
            justify-content: left;
            align-items: right;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Monospaced font for typing vibe */
        }

        .terminal-container {
            width: 100%;
            max-width: 900px;
        }

        #typing-text {
            font-size: 2.5rem;
            white-space: pre-wrap; /* Keeps line breaks */
            line-height: 2.2;
        }

        /* The flashing cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.5rem;
            background-color: #fff;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Hidden button that appears after typing */
        #reveal-btn {
            display: none;
            margin-top: 30px;
            padding: 10px 25px;
            background: none;
            border: 2px solid #fff;
            color: #fff;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }

        #reveal-btn:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <span id="typing-text"></span><span class="cursor"></span>
        <br>
        <button id="reveal-btn">next page</button>
    </div>

    <script>
        const textToType = "> hey nahu pahu...\n> i heard today is your birthday.\n> so i made you this special program.\n> (◕‿◕) ٩(◕‿◕)۶ ٩(◕‿◕)۶";
        const typingElement = document.getElementById('typing-text');
        const btn = document.getElementById('reveal-btn');
        let index = 0;

        function typeEffect() {
            if (index < textToType.length) {
                typingElement.textContent += textToType.charAt(index);
                index++;
                // Random typing speed for a more natural feel
                setTimeout(typeEffect, Math.random() * 50 + 50); 
            } else {
                // Show the button once typing is finished
                btn.style.display = 'inline-block';
                btn.addEventListener('click', function() {
                window.location.href = 'cake.html';
});
            }
        }

        // Start typing after a small delay
        window.onload = () => setTimeout(typeEffect, 1000);
    </script>
</body>
</html>
